name: Tank93 CI - E2E & Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run integration & E2E tests (21 tests, 0-latency debug DB checks)
      env:
        SDL_VIDEODRIVER: dummy
        SDL_AUDIODRIVER: dummy
        PYGAME_HIDE_SUPPORT_PROMPT: 1
      run: |
        pytest tests/ -v --tb=short

    - name: Debug report on failure
      if: failure()
      run: |
        python debug_report.py || true
        python -m game.debug_logger stats || true
        python debug_query.py --last --errors --limit 20 || true
        python debug_query.py --last --bounce || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-logs-${{ matrix.python-version }}
        path: |
          debug.db
          bug_trace.log
        if-no-files-found: ignore
